services:
  - type: web
    name: vorte-pro-pairing
    env: node
    plan: free
    buildCommand: "npm install"
    startCommand: "npm start"
    envVars:
      - key: NODE_VERSION
        value: "20.x"
      - key: SESSION_GENERATOR_ONLY
        value: "true"
      - key: PORT
        value: "10000"
